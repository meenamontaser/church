<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>برنامج متابعة الأسر - كنيسة الأنبا شنودة</title>
<meta name="theme-color" content="#1A1208">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="متابعة الأسر">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #1A1208; color: #F5EDD6; direction: rtl; min-height: 100vh; }
</style>
</head>
<body>
<div id="root"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAtSEqHUg1G81ReynWCImQurttmeyqblhM",
  authDomain: "meena-253b3.firebaseapp.com",
  projectId: "meena-253b3",
  storageBucket: "meena-253b3.firebasestorage.app",
  messagingSenderId: "612273445379",
  appId: "1:612273445379:web:33b2fcd882616feaa5cc36"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const DATA_DOC = doc(db, "church", "families");

const colors = {
  gold: "#B8962E", lightGold: "#D4AF5A", darkBg: "#1A1208",
  cardBg: "#2C1F0A", cardBorder: "#4A3510", text: "#F5EDD6",
  subtext: "#A89060", red: "#C0392B", inputBg: "#1F1505"
};

const initialData = {
  areas: [{
    id: 1, code: 1000, name: "منطقة أبونا",
    streets: [{
      id: 1, name: "شارع النصر",
      buildings: [{
        id: 1, name: "منزل 1",
        families: [{
          id: 1, code: 1001,
          husbandName: "مرقس جورج", husbandPhone: "01001234567",
          wifeName: "مريم عزيز", wifePhone: "01112345678",
          husbandBirthdate: "1980/05/10", wifeBirthdate: "1983/08/15",
          husbandFather: "أبونا بولس", wifeFather: "أبونا بولس",
          husbandQualification: "مهندس", wifeQualification: "طبيبة",
          husbandWork: "شركة المقاولون", wifeWork: "مستشفى الأقباط",
          husbandEmail: "", wifeEmail: "",
          husbandNationalId: "", wifeNationalId: "",
          churchService: "خادم", baptism: "نعم",
          engagementChurch: "أبونا", engagementDate: "2005/01/01",
          crownChurch: "أبونا", crownDate: "2006/06/06", notes: "",
          children: [
            { id: 1, name: "بطرس مرقس", gender: "ذكر", birthdate: "2007/03/12", father: "أبونا بولس", phone: "", qualification: "", notes: "" },
            { id: 2, name: "مريم مرقس", gender: "أنثى", birthdate: "2010/07/20", father: "أبونا بولس", phone: "", qualification: "", notes: "" }
          ]
        }]
      }]
    }]
  }]
};

// ==================== STATE ====================
let state = { data: null, path: [], modal: null, viewFamily: null, globalSearch: "", localSearch: "", syncing: false, lastSync: null };

// ==================== FIREBASE ====================
onSnapshot(DATA_DOC, (snap) => {
  if (snap.exists()) { state.data = snap.data().data; }
  else { setDoc(DATA_DOC, { data: initialData }); state.data = initialData; }
  state.lastSync = new Date();
  render();
});

async function save(newData) {
  state.syncing = true; render();
  await setDoc(DATA_DOC, { data: newData });
  state.syncing = false; state.lastSync = new Date(); render();
}

function updateData(fn) {
  const newData = fn(state.data);
  state.data = newData;
  save(newData);
  render();
}

// ==================== HELPERS ====================
const recodeFamilies = (families, areaCode) => families.map((f, i) => ({ ...f, code: areaCode + i + 1 }));
const nextAreaCode = () => state.data.areas.length === 0 ? 1000 : Math.max(...state.data.areas.map(a => a.code)) + 1000;

// ==================== CRUD ====================
window._addArea = name => updateData(d => ({ ...d, areas: [...d.areas, { id: Date.now(), code: nextAreaCode(), name, streets: [] }] }));
window._editArea = (id, name) => updateData(d => ({ ...d, areas: d.areas.map(a => a.id === id ? { ...a, name } : a) }));
window._deleteArea = id => { if (!confirm("حذف المنطقة؟")) return; updateData(d => { const f = d.areas.filter(a => a.id !== id); return { ...d, areas: f.map((a, i) => ({ ...a, code: (i+1)*1000 })) }; }); state.path = []; closeModal(); render(); };

window._addStreet = (aId, name) => updateData(d => ({ ...d, areas: d.areas.map(a => a.id === aId ? { ...a, streets: [...a.streets, { id: Date.now(), name, buildings: [] }] } : a) }));
window._editStreet = (aId, sId, name) => updateData(d => ({ ...d, areas: d.areas.map(a => a.id !== aId ? a : { ...a, streets: a.streets.map(s => s.id === sId ? { ...s, name } : s) }) }));
window._deleteStreet = (aId, sId) => { if (!confirm("حذف الشارع؟")) return; updateData(d => ({ ...d, areas: d.areas.map(a => a.id !== aId ? a : { ...a, streets: a.streets.filter(s => s.id !== sId) }) })); state.path = state.path.slice(0,1); closeModal(); render(); };

window._addBuilding = (aId, sId, name) => updateData(d => ({ ...d, areas: d.areas.map(a => a.id !== aId ? a : { ...a, streets: a.streets.map(s => s.id !== sId ? s : { ...s, buildings: [...s.buildings, { id: Date.now(), name, families: [] }] }) }) }));
window._editBuilding = (aId, sId, bId, name) => updateData(d => ({ ...d, areas: d.areas.map(a => a.id !== aId ? a : { ...a, streets: a.streets.map(s => s.id !== sId ? s : { ...s, buildings: s.buildings.map(b => b.id !== bId ? b : { ...b, name }) }) }) }));
window._deleteBuilding = (aId, sId, bId) => { if (!confirm("حذف المنزل؟")) return; updateData(d => ({ ...d, areas: d.areas.map(a => a.id !== aId ? a : { ...a, streets: a.streets.map(s => s.id !== sId ? s : { ...s, buildings: s.buildings.filter(b => b.id !== bId) }) }) })); state.path = state.path.slice(0,2); closeModal(); render(); };

window._addFamily = (aId, sId, bId, fam) => updateData(d => ({ ...d, areas: d.areas.map(a => a.id !== aId ? a : { ...a, streets: a.streets.map(s => s.id !== sId ? s : { ...s, buildings: s.buildings.map(b => b.id !== bId ? b : { ...b, families: recodeFamilies([...b.families, { ...fam, id: Date.now(), children: [] }], a.code) }) }) }) }));
window._editFamily = (aId, sId, bId, fId, fam) => updateData(d => ({ ...d, areas: d.areas.map(a => a.id !== aId ? a : { ...a, streets: a.streets.map(s => s.id !== sId ? s : { ...s, buildings: s.buildings.map(b => b.id !== bId ? b : { ...b, families: b.families.map(f => f.id !== fId ? f : { ...f, ...fam }) }) }) }) }));
window._deleteFamily = (aId, sId, bId, fId) => { if (!confirm("حذف الأسرة؟")) return; updateData(d => ({ ...d, areas: d.areas.map(a => a.id !== aId ? a : { ...a, streets: a.streets.map(s => s.id !== sId ? s : { ...s, buildings: s.buildings.map(b => b.id !== bId ? b : { ...b, families: recodeFamilies(b.families.filter(f => f.id !== fId), a.code) }) }) }) })); state.viewFamily = null; render(); };

window._moveFamily = (fromA, fromS, fromB, fId, toA, toS, toB) => {
  updateData(d => {
    let moved = null;
    let areas = d.areas.map(a => { if (a.id !== fromA) return a; return { ...a, streets: a.streets.map(s => { if (s.id !== fromS) return s; return { ...s, buildings: s.buildings.map(b => { if (b.id !== fromB) return b; moved = b.families.find(f => f.id === fId); return { ...b, families: recodeFamilies(b.families.filter(f => f.id !== fId), a.code) }; }) }; }) }; });
    if (!moved) return d;
    areas = areas.map(a => { if (a.id !== toA) return a; return { ...a, streets: a.streets.map(s => { if (s.id !== toS) return s; return { ...s, buildings: s.buildings.map(b => { if (b.id !== toB) return b; return { ...b, families: recodeFamilies([...b.families, { ...moved }], a.code) }; }) }; }) }; });
    return { ...d, areas };
  });
  state.viewFamily = null; closeModal(); render();
};

window._addChild = (aId, sId, bId, fId, child) => { updateData(d => ({ ...d, areas: d.areas.map(a => a.id !== aId ? a : { ...a, streets: a.streets.map(s => s.id !== sId ? s : { ...s, buildings: s.buildings.map(b => b.id !== bId ? b : { ...b, families: b.families.map(f => f.id !== fId ? f : { ...f, children: [...(f.children||[]), { ...child, id: Date.now() }] }) }) }) }) })); updateViewFamily(aId, sId, bId, fId); };
window._editChild = (aId, sId, bId, fId, cId, child) => { updateData(d => ({ ...d, areas: d.areas.map(a => a.id !== aId ? a : { ...a, streets: a.streets.map(s => s.id !== sId ? s : { ...s, buildings: s.buildings.map(b => b.id !== bId ? b : { ...b, families: b.families.map(f => f.id !== fId ? f : { ...f, children: f.children.map(c => c.id !== cId ? c : { ...c, ...child }) }) }) }) }) })); updateViewFamily(aId, sId, bId, fId); };
window._deleteChild = (aId, sId, bId, fId, cId) => { if (!confirm("حذف الابن؟")) return; updateData(d => ({ ...d, areas: d.areas.map(a => a.id !== aId ? a : { ...a, streets: a.streets.map(s => s.id !== sId ? s : { ...s, buildings: s.buildings.map(b => b.id !== bId ? b : { ...b, families: b.families.map(f => f.id !== fId ? f : { ...f, children: f.children.filter(c => c.id !== cId) }) }) }) }) })); updateViewFamily(aId, sId, bId, fId); };

function updateViewFamily(aId, sId, bId, fId) {
  if (!state.viewFamily) return;
  const area = state.data.areas.find(a => a.id === aId);
  const street = area?.streets.find(s => s.id === sId);
  const building = street?.buildings.find(b => b.id === bId);
  const fam = building?.families.find(f => f.id === fId);
  if (fam) state.viewFamily = { ...state.viewFamily, fam };
}

// ==================== NAVIGATION ====================
window._goHome = () => { state.path = []; state.localSearch = ""; render(); };
window._goTo = (type, id) => { state.path = [...state.path, { type, id }]; state.localSearch = ""; state.globalSearch = ""; render(); };
window._goBack = (idx) => { state.path = state.path.slice(0, idx + 1); state.localSearch = ""; render(); };
window._setGlobalSearch = (v) => { state.globalSearch = v; render(); };
window._setLocalSearch = (v) => { state.localSearch = v; render(); };
window._setViewFamily = (vf) => { state.viewFamily = vf; render(); };
window._setModal = (m) => { state.modal = m; render(); };
function closeModal() { state.modal = null; }

// ==================== SEARCH ====================
function globalResults() {
  const q = state.globalSearch;
  if (!q || q.length < 2) return [];
  const results = []; const ql = q.toLowerCase();
  const famFields = [
    ["husbandName","اسم الزوج"],["wifeName","اسم الزوجة"],
    ["husbandPhone","موبايل الزوج"],["wifePhone","موبايل الزوجة"],
    ["husbandBirthdate","ميلاد الزوج"],["wifeBirthdate","ميلاد الزوجة"],
    ["husbandFather","أب اعتراف الزوج"],["wifeFather","أب اعتراف الزوجة"],
    ["husbandQualification","مؤهل الزوج"],["wifeQualification","مؤهل الزوجة"],
    ["husbandWork","عمل الزوج"],["wifeWork","عمل الزوجة"],
    ["husbandEmail","Email الزوج"],["wifeEmail","Email الزوجة"],
    ["husbandNationalId","رقم قومي الزوج"],["wifeNationalId","رقم قومي الزوجة"],
    ["churchService","الخدمة الكنسية"],["baptism","المعمودية"],
    ["engagementChurch","خطوبة"],["crownChurch","إكليل"],["notes","ملاحظات"]
  ];
  state.data.areas.forEach(area => {
    if (area.name.toLowerCase().includes(ql)) results.push({ type: "area", label: area.name, sub: "كود: " + area.code, area });
    area.streets.forEach(street => {
      if (street.name.toLowerCase().includes(ql)) results.push({ type: "street", label: street.name, sub: area.name, area, street });
      street.buildings.forEach(building => {
        if (building.name.toLowerCase().includes(ql)) results.push({ type: "building", label: building.name, sub: area.name + " > " + street.name, area, street, building });
        building.families.forEach(fam => {
          const matchedFields = famFields.filter(([k]) => fam[k] && fam[k].toString().toLowerCase().includes(ql));
          if (matchedFields.length > 0 || String(fam.code).includes(ql)) {
            const matchInfo = matchedFields.map(([,l]) => l).join("، ");
            results.push({ type: "family", label: (fam.husbandName||"") + (fam.wifeName ? " & " + fam.wifeName : ""), sub: area.name + " > " + street.name + " > " + building.name + " . كود: " + fam.code + (matchInfo ? " . " + matchInfo : ""), area, street, building, fam });
          }
          (fam.children||[]).forEach(child => {
            const cf = [child.name, child.father, child.qualification, child.work, child.phone, child.birthdate];
            if (cf.some(f => f && f.toLowerCase().includes(ql))) results.push({ type: "child", label: child.name, sub: "أسرة " + fam.husbandName + " . " + area.name, area, street, building, fam });
          });
        });
      });
    });
  });
  return results.slice(0, 30);
}

function highlight(text, q) {
  if (!q || !text) return escHtml(text || "");
  const idx = text.toLowerCase().indexOf(q.toLowerCase());
  if (idx === -1) return escHtml(text);
  return escHtml(text.slice(0, idx)) + `<mark style="background:#4A3510;color:#D4AF5A;border-radius:3px;padding:0 2px">${escHtml(text.slice(idx, idx + q.length))}</mark>` + escHtml(text.slice(idx + q.length));
}

function escHtml(t) { return (t||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

// ==================== RENDER ====================
function css(obj) { return Object.entries(obj).map(([k,v]) => `${k.replace(/([A-Z])/g,'-$1').toLowerCase()}:${v}`).join(';'); }

const C = {
  header: `background:linear-gradient(135deg,#0D0800,#2C1F0A);border-bottom:2px solid #B8962E;padding:14px 24px;text-align:center`,
  card: `background:#2C1F0A;border:1px solid #4A3510;border-radius:10px;padding:12px 10px;cursor:pointer;text-align:center;margin-bottom:0`,
  btn: `background:#B8962E;color:#000;border:none;border-radius:6px;padding:6px 14px;cursor:pointer;font-weight:bold;font-size:12px`,
  btnSm: `background:#B8962E;color:#000;border:none;border-radius:5px;padding:3px 9px;cursor:pointer;font-size:11px;font-weight:bold`,
  btnDanger: `background:#C0392B;color:#fff;border:none;border-radius:5px;padding:3px 9px;cursor:pointer;font-size:11px`,
  btnOutline: `background:transparent;color:#B8962E;border:1px solid #B8962E;border-radius:5px;padding:3px 9px;cursor:pointer;font-size:11px`,
  input: `width:100%;background:#1F1505;border:1px solid #4A3510;border-radius:6px;padding:7px 10px;color:#F5EDD6;font-size:12px;box-sizing:border-box;font-family:inherit`,
  searchInput: `width:100%;background:#1F1505;border:1px solid #B8962E;border-radius:8px;padding:9px 14px;color:#F5EDD6;font-size:13px;box-sizing:border-box;margin-bottom:14px;font-family:inherit`,
  modal: `position:fixed;inset:0;background:rgba(0,0,0,0.85);display:flex;align-items:center;justify-content:center;z-index:1000;padding:12px`,
  modalBox: `background:#1E1305;border:1px solid #B8962E;border-radius:12px;padding:20px;width:100%;max-width:540px;max-height:88vh;overflow-y:auto`,
  tag: `display:inline-block;background:#3A2810;color:#D4AF5A;border-radius:4px;padding:2px 7px;font-size:11px`,
  sectionTitle: `color:#B8962E;font-size:12px;border-bottom:1px solid #4A3510;padding-bottom:5px;margin-bottom:8px;margin-top:12px`,
  familyCard: `background:#2C1F0A;border:1px solid #4A3510;border-radius:10px;padding:14px;margin-bottom:10px`,
};

function renderGrid(items, addFn, cardFn) {
  const filtered = state.localSearch ? items.filter(i => (i.name||"").toLowerCase().includes(state.localSearch.toLowerCase())) : items;
  return `
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px">
      ${filtered.map(cardFn).join("")}
      <div style="background:transparent;border:1.5px dashed #4A3510;border-radius:10px;padding:12px 10px;cursor:pointer;text-align:center;color:#A89060;font-size:22px" onclick="${addFn}">+</div>
    </div>`;
}

function renderHome() {
  const areas = state.localSearch ? state.data.areas.filter(a => a.name.toLowerCase().includes(state.localSearch.toLowerCase())) : state.data.areas;
  // Note: home search by name only
  return `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px">
      <span style="color:#B8962E;font-size:15px">المناطق</span>
      <button style="${C.btn}" onclick="_setModal({type:'addArea'})">+ منطقة</button>
    </div>
    <input style="${C.searchInput}" placeholder="🔍 بحث في المناطق..." value="${escHtml(state.localSearch)}" oninput="_setLocalSearch(this.value)">
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px">
      ${areas.map(area => `
        <div style="${C.card}">
          <div onclick="_goTo('area',${area.id})">
            <div style="font-size:11px;color:#A89060;margin-bottom:4px">${area.code}</div>
            <div style="font-size:13px;font-weight:bold">${highlight(area.name, state.localSearch)}</div>
            <div style="font-size:11px;color:#A89060;margin-top:6px">${area.streets.length} شارع</div>
          </div>
          <div style="display:flex;gap:4px;justify-content:center;margin-top:8px">
            <button style="${C.btnSm}" onclick="event.stopPropagation();_setModal({type:'editArea',areaId:${area.id},name:'${escHtml(area.name)}'})">تعديل</button>
            <button style="${C.btnDanger}" onclick="event.stopPropagation();_deleteArea(${area.id})">حذف</button>
          </div>
        </div>`).join("")}
      <div style="background:transparent;border:1.5px dashed #4A3510;border-radius:10px;padding:12px 10px;cursor:pointer;text-align:center;color:#A89060;font-size:22px" onclick="_setModal({type:'addArea'})">+</div>
    </div>`;
}

function renderArea(area) {
  // Area-wide search across all families
  const areaSearch = state.localSearch;
  const areaSearchL = areaSearch.toLowerCase();
  
  const allFamFields = (f) => [f.husbandName,f.wifeName,f.husbandPhone,f.wifePhone,String(f.code||""),f.husbandBirthdate,f.wifeBirthdate,f.husbandFather,f.wifeFather,f.husbandQualification,f.wifeQualification,f.husbandWork,f.wifeWork,f.husbandEmail,f.wifeEmail,f.husbandNationalId,f.wifeNationalId,f.churchService,f.baptism,f.notes];

  let areaResults = [];
  if (areaSearch.length >= 2) {
    area.streets.forEach(street => {
      street.buildings.forEach(building => {
        building.families.forEach(fam => {
          const famMatch = allFamFields(fam).some(v => v && v.toString().toLowerCase().includes(areaSearchL));
          const childMatch = (fam.children||[]).some(c => [c.name,c.father,c.qualification,c.phone,c.birthdate].some(v => v && v.toLowerCase().includes(areaSearchL)));
          if (famMatch || childMatch) {
            areaResults.push({ fam, street, building });
          }
        });
      });
    });
  }

  const streets = !areaSearch ? area.streets : area.streets.filter(s => s.name.toLowerCase().includes(areaSearchL));
  return `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px">
      <span style="color:#B8962E;font-size:15px">${escHtml(area.name)} <span style="font-size:11px;color:#A89060">(${area.code})</span></span>
      <div style="display:flex;gap:6px">
        <button style="${C.btnOutline}" onclick="_setModal({type:'editArea',areaId:${area.id},name:'${escHtml(area.name)}'})">تعديل</button>
        <button style="${C.btn}" onclick="_setModal({type:'addStreet',areaId:${area.id}})">+ شارع</button>
        <button style="${C.btnDanger}" onclick="_deleteArea(${area.id})">حذف</button>
      </div>
    </div>
    <input style="${C.searchInput}" placeholder="🔍 بحث في المنطقة (اسم، كود، وظيفة، موبايل...)" value="${escHtml(state.localSearch)}" oninput="_setLocalSearch(this.value)">
    
    ${areaSearch.length >= 2 ? `
    <div style="margin-bottom:16px">
      <div style="color:#B8962E;font-size:13px;margin-bottom:8px">نتائج البحث (${areaResults.length})</div>
      ${areaResults.length === 0 ? '<div style="color:#A89060;text-align:center;padding:20px">لا توجد نتائج</div>' : 
        areaResults.map(({fam, street, building}) => `
        <div style="${C.familyCard};cursor:pointer" onclick="_openFamily(${area.id},${street.id},${building.id},${fam.id})">
          <div style="font-size:11px;color:#B8962E;margin-bottom:3px">كود: ${fam.code} · ${escHtml(street.name)} › ${escHtml(building.name)}</div>
          <div style="font-size:14px;font-weight:bold">${escHtml(fam.husbandName||"")}${fam.wifeName?" & "+escHtml(fam.wifeName):""}</div>
          <div style="font-size:11px;color:#A89060;margin-top:3px">${escHtml(fam.husbandWork||"")}${fam.wifeWork?" · "+escHtml(fam.wifeWork):""}</div>
        </div>`).join("")
      }
    </div>` : `
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px">
      ${streets.map(street => `
        <div style="${C.card}">
          <div onclick="_goTo('street',${street.id})">
            <div style="font-size:13px;font-weight:bold">${highlight(street.name, state.localSearch)}</div>
            <div style="font-size:11px;color:#A89060;margin-top:6px">${street.buildings.length} منزل</div>
          </div>
          <div style="display:flex;gap:4px;justify-content:center;margin-top:8px">

  return `

}


window._filterChildren = (childIds, q, aId, sId, bId, fId) => {
  const area = state.data.areas.find(a => a.id === aId);
  const street = area?.streets.find(s => s.id === sId);
  const building = street?.buildings.find(b => b.id === bId);
  const fam = building?.families.find(f => f.id === fId);
  if (!fam) return "";
  const children = q ? (fam.children||[]).filter(c => 
    [c.name,c.father,c.qualification,c.work,c.phone,c.birthdate,c.gender].some(v => v&&v.toLowerCase().includes(q.toLowerCase()))
  ) : (fam.children||[]);
  if (children.length === 0) return '<div style="text-align:center;color:#A89060;font-size:12px;padding:10px">لا توجد نتائج</div>';
  return children.map(child => `
    <div style="background:#1A0F04;border-radius:6px;padding:7px 10px;margin-bottom:5px;display:flex;justify-content:space-between;align-items:center">
      <div><div style="font-size:13px;font-weight:bold">${escHtml(child.name)}</div><div style="font-size:11px;color:#A89060">${escHtml(child.gender)} · ${escHtml(child.birthdate||"")}</div></div>
      <div style="display:flex;gap:6px;align-items:center">
        <span style="display:inline-block;background:#3A2810;color:#D4AF5A;border-radius:4px;padding:2px 7px;font-size:11px">${escHtml(child.father||"")}</span>
        <button style="background:#B8962E;color:#000;border:none;border-radius:5px;padding:3px 9px;cursor:pointer;font-size:11px;font-weight:bold" onclick="_setModal({type:'editChild',areaId:${aId},streetId:${sId},buildingId:${bId},famId:${fId},childId:${child.id}})">تعديل</button>
        <button style="background:#C0392B;color:#fff;border:none;border-radius:5px;padding:3px 9px;cursor:pointer;font-size:11px" onclick="_deleteChild(${aId},${sId},${bId},${fId},${child.id})">حذف</button>
      </div>
    </div>`).join("");
};

window._openFamily = (aId, sId, bId, fId) => {
  const area = state.data.areas.find(a => a.id === aId);
  const street = area?.streets.find(s => s.id === sId);
  const building = street?.buildings.find(b => b.id === bId);
  const fam = building?.families.find(f => f.id === fId);
  if (fam) { state.viewFamily = { fam, areaId: aId, streetId: sId, buildingId: bId }; render(); }

window._updateMoveStreets = () => {
  const aId = parseInt(document.getElementById("mv_area").value);
  const area = state.data.areas.find(a => a.id === aId);
  const sSel = document.getElementById("mv_street");
  const bSel = document.getElementById("mv_building");
  sSel.innerHTML = `<option value="">الشارع</option>${(area?.streets||[]).map(s=>`<option value="${s.id}">${escHtml(s.name)}</option>`).join("")}`;
  bSel.innerHTML = `<option value="">المنزل</option>`;
  sSel.onchange = () => {
    const sId = parseInt(sSel.value);
    const street = area?.streets.find(s => s.id === sId);
    bSel.innerHTML = `<option value="">المنزل</option>${(street?.buildings||[]).map(b=>`<option value="${b.id}">${escHtml(b.name)}</option>`).join("")}`;
  };
};

window._doMove = (fromA, fromS, fromB, fId) => {
  const toA = parseInt(document.getElementById("mv_area")?.value);
  const toS = parseInt(document.getElementById("mv_street")?.value);
  const toB = parseInt(document.getElementById("mv_building")?.value);
  if (!toA || !toS || !toB) { alert("اختر المنطقة والشارع والمنزل"); return; }
  _moveFamily(fromA, fromS, fromB, fId, toA, toS, toB);
};

      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><span style="color:#B8962E;font-size:15px;font-weight:bold">${m.type==="addChild"?"إضافة ابن/بنت":"تعديل الابن"}</span><button onclick="_setModal(null)" style="background:none;border:none;color:#A89060;font-size:18px;cursor:pointer">✕</button></div>
      <div style="display:flex;gap:10px;margin-bottom:10px">
        <div style="flex:1"><label style="font-size:11px;color:#A89060;display:block;margin-bottom:3px">الاسم</label><input id="c_name" style="${C.input}" value="${escHtml(child.name||"")}"></div>
        <div style="flex:1"><label style="font-size:11px;color:#A89060;display:block;margin-bottom:3px">الجنس</label><select id="c_gender" style="${C.input}"><option ${child.gender!=="أنثى"?"selected":""}>ذكر</option><option ${child.gender==="أنثى"?"selected":""}>أنثى</option></select></div>
      </div>
      <div style="display:flex;gap:10px;margin-bottom:10px">
        <div style="flex:1"><label style="font-size:11px;color:#A89060;display:block;margin-bottom:3px">تاريخ الميلاد</label><input id="c_birth" style="${C.input}" value="${escHtml(child.birthdate||"")}"></div>
        <div style="flex:1"><label style="font-size:11px;color:#A89060;display:block;margin-bottom:3px">أب الاعتراف</label><input id="c_father" style="${C.input}" value="${escHtml(child.father||"أبونا")}"></div>
      </div>
      <div style="display:flex;gap:10px;margin-bottom:12px">
        <div style="flex:1"><label style="font-size:11px;color:#A89060;display:block;margin-bottom:3px">المؤهل / العمل</label><input id="c_qual" style="${C.input}" value="${escHtml(child.qualification||"")}"></div>
        <div style="flex:1"><label style="font-size:11px;color:#A89060;display:block;margin-bottom:3px">الموبايل</label><input id="c_phone" style="${C.input}" value="${escHtml(child.phone||"")}"></div>
      </div>
      <div style="text-align:center"><button style="${C.btn}" onclick="${saveCmd}">حفظ</button></div>
    </div></div>`;
  }
  return "";
}

function render() {
  if (!state.data) {
    document.getElementById("root").innerHTML = `<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px"><div style="font-size:30px;color:#B8962E">✞</div><div style="color:#B8962E;font-size:16px">جاري التحميل...</div></div>`;
    return;
  }

  const path = state.path;
  const area = path[0] ? state.data.areas.find(a => a.id === path[0].id) : null;
  const street = path[1] ? area?.streets.find(s => s.id === path[1].id) : null;
  const building = path[2] ? street?.buildings.find(b => b.id === path[2].id) : null;

  const gResults = globalResults();
  const typeLabel = { area:"منطقة", street:"شارع", building:"منزل", family:"أسرة", child:"ابن/بنت" };

  const html = `
    <div style="background:linear-gradient(135deg,#0D0800,#2C1F0A);border-bottom:2px solid #B8962E;padding:14px 24px;text-align:center">
      <div style="font-size:20px;color:#B8962E;margin-bottom:4px">✞</div>
      <div style="font-size:12px;color:#A89060;margin-bottom:2px">مطرانية الأقباط الأرثوذكس بطهطا وجهينة</div>
      <div style="font-size:18px;color:#B8962E;font-weight:bold;margin-bottom:2px">برنامج متابعة الأسر</div>
      <div style="font-size:12px;color:#A89060">كنيسة الأنبا شنودة رئيس المتوحدين</div>
    </div>
    <div style="background:#0D1F0D;border-bottom:1px solid #1A3A1A;padding:6px 16px;font-size:11px;text-align:center;color:${state.syncing?"#F0A500":"#4CAF50"}">
      ${state.syncing ? "⏳ جاري الحفظ..." : `✅ محفوظ ومتزامن${state.lastSync?" · "+state.lastSync.toLocaleTimeString("ar-EG"):""}`}
    </div>

    ${path.length > 0 ? `
    <div style="display:flex;align-items:center;gap:6px;padding:8px 20px;background:#110D04;border-bottom:1px solid #4A3510;flex-wrap:wrap">
      <button style="background:none;border:none;color:#D4AF5A;cursor:pointer;font-size:13px;padding:2px 6px" onclick="_goHome()">الرئيسية</button>
      ${area ? `<span style="color:#A89060;font-size:12px">›</span><button style="background:none;border:none;color:#D4AF5A;cursor:pointer;font-size:13px;padding:2px 6px" onclick="${path.length>1?"_goBack(0)":"null"}">${escHtml(area.name)}</button>` : ""}
      ${street ? `<span style="color:#A89060;font-size:12px">›</span><button style="background:none;border:none;color:#D4AF5A;cursor:pointer;font-size:13px;padding:2px 6px" onclick="${path.length>2?"_goBack(1)":"null"}">${escHtml(street.name)}</button>` : ""}
      ${building ? `<span style="color:#A89060;font-size:12px">›</span><span style="color:#D4AF5A;font-size:13px;padding:2px 6px">${escHtml(building.name)}</span>` : ""}
    </div>` : ""}
    <div style="padding:16px;max-width:900px;margin:0 auto">
      ${path.length === 0 ? renderHome() : ""}
      ${path.length === 1 && area ? renderArea(area) : ""}
      ${path.length === 2 && area && street ? renderStreet(area, street) : ""}
      ${path.length === 3 && area && street && building ? renderBuilding(area, street, building) : ""}
    </div>
    ${state.viewFamily ? renderFamilyModal(state.viewFamily) : ""}
    ${renderModal()}
  `;

  document.getElementById("root").innerHTML = html;

  // Store search results for click handler
  window._gResults = gResults;
}

window._gotoResult = (i) => {
  const r = window._gResults[i];
  state.globalSearch = "";
  if (r.type === "area") state.path = [{ type:"area", id:r.area.id }];
  else if (r.type === "street") state.path = [{ type:"area", id:r.area.id }, { type:"street", id:r.street.id }];
  else if (r.type === "building") state.path = [{ type:"area", id:r.area.id }, { type:"street", id:r.street.id }, { type:"building", id:r.building.id }];
  else if (r.type === "family" || r.type === "child") {
    state.path = [{ type:"area", id:r.area.id }, { type:"street", id:r.street.id }, { type:"building", id:r.building.id }];
    state.viewFamily = { fam:r.fam, areaId:r.area.id, streetId:r.street.id, buildingId:r.building.id };
  }
  render();
};

render();
</script>
</body>
</html>
